[phases.setup]
nixPkgs = ["dotnet-sdk_10", "nodejs"]

[phases.install]
cmds = ["dotnet restore"]

[phases.build]
cmds = [
  "cd ../frontend && npm ci && npm run build",
  "mkdir -p wwwroot",
  "cp -r ../frontend/dist/* wwwroot/",
  "dotnet publish -c Release --output /app/out"
]

[start]
cmd = "dotnet /app/out/game-store.dll"
