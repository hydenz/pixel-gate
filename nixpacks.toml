[phases.setup]
nixPkgs = ["dotnet-sdk_10", "nodejs"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "cd backend && dotnet restore"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "mkdir -p backend/wwwroot",
  "cp -r frontend/dist/* backend/wwwroot/",
  "cd backend && dotnet publish -c Release --output /app/out"
]

[start]
cmd = "dotnet /app/out/game-store.dll"
